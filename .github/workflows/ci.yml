name: CI

# Lint + unit tests on every PR and on every branch push (so CI runs on both the
# public repo's main and the private instance's working branch).
# Unit tests run with `-m "not integration"` so no API key or network is needed.
on:
  pull_request:
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    # Point the framework at the checked-out repo (agents/, workflows/ live at its root).
    env:
      AGENTOS_ROOT: ${{ github.workspace }}
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (with dev extras)
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest (unit, no integration)
        run: pytest -q -m "not integration"
